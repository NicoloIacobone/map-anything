defaults:
  - default
  - override blendedmvs_wai/train: distillation
  - override blendedmvs_wai/val: distillation

# Number of views parameter for the multi-view datasets
num_views: 4
# Number of workers for dataloader
num_workers: 8

train:
  # If True, the number of views can vary from batch to batch. The maximum number of views is num_views and minimum is 2. (On by default for N-view training)
  variable_num_views: false

# Train Resolution
# resolution_train: ${dataset.resolution_options.518_many_ar} <- original, conteneva molte risoluzioni diverse
resolution_train: ${dataset.resolution_options.224_1_00_ar}
# ora solo 224x224

# Validation Resolution
# resolution_val_blendedmvs: ${dataset.resolution_options.518_1_33_ar} <- original, conteneva molte risoluzioni diverse
resolution_val_blendedmvs: ${dataset.resolution_options.224_1_00_ar}

# Training Set - num_scene @ dataset_setting - es. if num_views = 4 -> 2 @ 4 = 8 tot imgs
train_dataset:
  "+ 10_000 @ ${dataset.blendedmvs_wai.train.dataset_str}"

# Validation Set
test_dataset:
  "+ 100 @ ${dataset.blendedmvs_wai.val.dataset_str}"